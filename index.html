<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snapdrum Triage</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',Arial,sans-serif;min-height:100vh;transition:background .25s,color .25s}
body.dark{background:#0d0d10;color:#ededf0}
body.light{background:#f5f5f7;color:#111118}

body.dark{
  --surface:#141417;--surface2:#1c1c21;--surface3:#232329;
  --border:#26262e;--border2:#32323c;
  --text:#ededf0;--text2:#88889a;--text3:#44444e;
  --accent:#7c6cfc;--accent-dim:#2a2350;
  --red:#ff5252;--red-dim:#2a1212;
  --amber:#f5a623;--amber-dim:#2a1e08;
  --card:#1c1c21;--modal:#141417;--input:#1c1c21;
  --shadow:rgba(0,0,0,.4);
}
body.light{
  --surface:#ffffff;--surface2:#f5f5f7;--surface3:#ebebef;
  --border:#e4e4ea;--border2:#d0d0da;
  --text:#111118;--text2:#666678;--text3:#aaaabc;
  --accent:#6c5ce7;--accent-dim:#ede9ff;
  --red:#e53e3e;--red-dim:#fff0f0;
  --amber:#b06a00;--amber-dim:#fff8e6;
  --card:#ffffff;--modal:#ffffff;--input:#f5f5f7;
  --shadow:rgba(0,0,0,.08);
}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;height:52px;
  background:var(--surface);border-bottom:1px solid var(--border);
  gap:12px;
}
.logo{font-size:14px;font-weight:600;letter-spacing:-.01em;color:var(--text);display:flex;align-items:center;gap:7px}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:10px}
.save-tag{font-size:11px;color:var(--text3);opacity:0;transition:opacity .3s}
.save-tag.show{opacity:1}

/* Progress ring — compact */
.ring-wrap{position:relative;width:34px;height:34px;flex-shrink:0;cursor:default}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;color:var(--accent);font-family:'DM Mono',monospace}

/* Theme toggle */
.toggle{width:32px;height:18px;border-radius:99px;background:var(--surface3);border:1px solid var(--border2);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:var(--accent);transition:transform .2s}
body.light .toggle::after{transform:translateX(14px)}

/* Manage dropdown */
.manage-wrap{position:relative}
.manage-btn{font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:'DM Sans',Arial,sans-serif;transition:all .15s}
.manage-btn:hover{border-color:var(--border2);color:var(--text)}
.manage-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--modal);border:1px solid var(--border2);border-radius:10px;padding:6px;min-width:160px;z-index:60;box-shadow:0 8px 24px var(--shadow)}
.manage-menu.hidden{display:none}
.manage-item{font-size:13px;padding:8px 12px;border-radius:6px;cursor:pointer;color:var(--text2);transition:background .12s}
.manage-item:hover{background:var(--surface2);color:var(--text)}

/* ── TOOLBAR ── */
.toolbar{
  display:flex;align-items:center;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 20px;gap:0;position:relative;
}

/* Row: scrollable section chips */
.row-sections{display:flex;align-items:center;gap:5px;overflow-x:auto;padding:10px 0;scrollbar-width:none;flex:1}
.row-sections::-webkit-scrollbar{display:none}

/* Divider */
.tdiv{width:1px;height:18px;background:var(--border);flex-shrink:0;margin:0 10px}

/* Status pills */
.row-status{display:flex;align-items:center;gap:4px;padding:10px 0;flex-shrink:0}

/* Assignee + Add card */
.row-actions{display:flex;align-items:center;gap:6px;padding:10px 0 10px 10px;flex-shrink:0;border-left:1px solid var(--border);margin-left:10px}

/* Chips shared */
.chip{font-size:12px;padding:4px 11px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:'DM Sans',Arial,sans-serif;flex-shrink:0}
.chip:hover{background:var(--surface2);color:var(--text)}
.chip.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}
body.light .chip.active{background:var(--accent-dim);color:var(--accent)}

/* Status chips show count */
.chip-count{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;margin-right:3px}

/* Assignee dropdown */
.asgn-wrap{position:relative}
.asgn-btn{font-size:12px;padding:4px 11px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:'DM Sans',Arial,sans-serif;display:flex;align-items:center;gap:6px;transition:all .15s}
.asgn-btn:hover{border-color:var(--border2);color:var(--text)}
.asgn-btn.filtered{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
body.light .asgn-btn.filtered{background:var(--accent-dim)}
.asgn-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.asgn-menu{position:fixed;background:var(--modal);border:1px solid var(--border2);border-radius:10px;padding:6px;min-width:180px;z-index:200;box-shadow:0 8px 24px var(--shadow)}
.asgn-menu.hidden{display:none}
.asgn-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;transition:background .12s}
.asgn-item:hover{background:var(--surface2)}
.asgn-item.selected{background:var(--surface2)}
.asgn-avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;color:#fff;flex-shrink:0}
.asgn-name{font-size:12px;color:var(--text);flex:1}
.asgn-check{font-size:11px;color:var(--accent);width:12px;text-align:center}
.asgn-divider{height:1px;background:var(--border);margin:4px 0}

/* Add card btn */
.add-btn{font-size:12px;padding:5px 14px;border-radius:6px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer;white-space:nowrap;font-family:'DM Sans',Arial,sans-serif;transition:all .15s;font-weight:500}
.add-btn:hover{background:var(--accent);color:#fff}

/* ── BOARD ── */
.board{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;padding:16px 20px 40px}
.col-head{display:flex;align-items:center;justify-content:space-between;padding-bottom:8px}
.col-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.12em;color:var(--text3)}
.col-count{font-size:11px;font-family:'DM Mono',monospace;background:var(--surface2);color:var(--text3);padding:1px 7px;border-radius:4px}
.col-body{background:var(--surface2);border-radius:8px;padding:8px;min-height:180px;display:flex;flex-direction:column;gap:6px;transition:outline .15s}
.col-body.drag-over{outline:2px solid var(--accent);outline-offset:-2px}
.col-empty{font-size:11px;color:var(--text3);text-align:center;padding:28px 0;pointer-events:none}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:grab;transition:border-color .15s,opacity .2s}
.card:hover{border-color:var(--border2)}
.card.dragging{opacity:.3;cursor:grabbing}
.card-sec{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px}
.card-title{font-size:13px;font-weight:500;line-height:1.35;color:var(--text)}
.badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.b-urgent{background:var(--red-dim);color:var(--red)}
.b-thisweek{background:var(--amber-dim);color:var(--amber)}
.b-planning{background:var(--surface3);color:var(--text2)}
.deadline{font-size:10px;color:var(--red);font-weight:500;margin-bottom:5px;display:flex;align-items:center;gap:4px}
.dl-dot{width:4px;height:4px;border-radius:50%;background:var(--red);flex-shrink:0}
.tasks{display:flex;flex-direction:column;gap:3px;margin-bottom:5px}
.task-row{display:flex;align-items:flex-start;gap:6px}
.cb{width:13px;height:13px;border-radius:3px;border:1px solid var(--border2);background:transparent;flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cb:hover{border-color:var(--accent)}
.cb.checked{background:var(--accent);border-color:var(--accent)}
.cb.checked::after{content:'';display:block;width:4px;height:6px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg);margin-top:-1px}
.task-txt{font-size:11px;color:var(--text2);line-height:1.45}
.task-txt.done{color:var(--text3);text-decoration:line-through}
.prog-bar-wrap{margin-top:5px;margin-bottom:2px}
.prog-bar{height:2px;background:var(--border);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .3s}
.prog-txt{font-size:10px;color:var(--text3);margin-top:3px;font-family:'DM Mono',monospace}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:6px;border-top:1px solid var(--border)}
.card-avatars{display:flex;gap:3px}
.c-avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;color:#fff;border:1.5px solid var(--card)}
.edit-btn{font-size:10px;padding:2px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .12s;font-family:'DM Sans',Arial,sans-serif}
.edit-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-start;justify-content:center;padding:60px 20px 20px}
.overlay.open{display:flex}
.modal{background:var(--modal);border:1px solid var(--border2);border-radius:12px;padding:22px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;box-shadow:0 16px 48px var(--shadow)}
.modal-title{font-size:15px;font-weight:600;margin-bottom:16px;color:var(--text)}
.form-group{margin-bottom:12px}
.form-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;display:block;font-weight:500}
.form-input{width:100%;background:var(--input);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:13px;font-family:'DM Sans',Arial,sans-serif;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--accent)}
.form-input option{background:var(--modal);color:var(--text)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.task-edit-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.task-edit-row input{flex:1}
.rm-btn{font-size:16px;color:var(--text3);background:none;border:none;cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0;font-family:'DM Sans',Arial,sans-serif}
.rm-btn:hover{color:var(--red)}
.add-field-btn{font-size:11px;color:var(--accent);background:none;border:1px dashed var(--border2);border-radius:6px;padding:5px 10px;cursor:pointer;width:100%;margin-top:2px;font-family:'DM Sans',Arial,sans-serif}
.add-field-btn:hover{border-color:var(--accent)}
.assignee-picker{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.ap-chip{font-size:11px;padding:3px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;font-family:'DM Sans',Arial,sans-serif}
.ap-chip:hover{border-color:var(--border2);color:var(--text)}
.ap-chip.sel{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
body.light .ap-chip.sel{background:var(--accent-dim)}
.ap-dot{width:7px;height:7px;border-radius:50%}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.btn-cancel{font-size:12px;padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:'DM Sans',Arial,sans-serif}
.btn-save{font-size:12px;padding:6px 16px;border-radius:6px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-weight:500;font-family:'DM Sans',Arial,sans-serif}
.btn-del{font-size:12px;padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--red);cursor:pointer;margin-right:auto;font-family:'DM Sans',Arial,sans-serif}

/* People/Sections modal shared */
.list-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface2);border-radius:7px;border:1px solid var(--border);margin-bottom:6px}
.list-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0}
.list-label{font-size:13px;color:var(--text);flex:1}
.list-actions{display:flex;gap:4px;align-items:center}
.sm-btn{font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-family:'DM Sans',Arial,sans-serif}
.sm-btn:hover{border-color:var(--border2);color:var(--text)}
.sm-btn.danger:hover{border-color:var(--red);color:var(--red)}
.inline-add{display:flex;gap:6px;margin-top:8px}
.inline-add input{flex:1}

@media(max-width:900px){.board{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.board{grid-template-columns:1fr;padding:10px}.topbar,.toolbar{padding:0 12px}}
</style>
</head>
<body class="dark">

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo"><div class="logo-dot"></div>Snapdrum Triage</div>
  <div class="topbar-right">
    <span class="save-tag" id="save-tag">Saved</span>
    <div class="ring-wrap" title="Overall task completion">
      <svg width="34" height="34" viewBox="0 0 34 34">
        <circle cx="17" cy="17" r="13" fill="none" stroke="var(--border2)" stroke-width="2.5"/>
        <circle id="ring" cx="17" cy="17" r="13" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="81.7" stroke-dashoffset="81.7" style="transition:stroke-dashoffset .4s"/>
      </svg>
      <div class="ring-val" id="ring-pct">0%</div>
    </div>
    <button class="toggle" onclick="toggleTheme()" title="Toggle theme"></button>
    <div class="manage-wrap" id="manage-wrap">
      <button class="manage-btn" onclick="toggleManage()">Manage</button>
      <div class="manage-menu hidden" id="manage-menu">
        <div class="manage-item" onclick="openPeople();closeManage()">People</div>
        <div class="manage-item" onclick="openSections();closeManage()">Sections</div>
      </div>
    </div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <!-- 1. Section filters -->
  <div class="row-sections" id="row-sections"></div>

  <div class="tdiv"></div>

  <!-- 2. Status filters -->
  <div class="row-status" id="row-status"></div>

  <!-- 3. Assignee + Add -->
  <div class="row-actions">
    <div class="asgn-wrap" id="asgn-wrap">
      <button class="asgn-btn" id="asgn-btn" onclick="toggleAsgn()">
        <span id="asgn-label">Assignee</span>
      </button>
      <div class="asgn-menu hidden" id="asgn-menu"></div>
    </div>
    <button class="add-btn" onclick="openAdd()">+ Add card</button>
  </div>
</div>

<!-- BOARD -->
<div class="board">
  <div><div class="col-head"><span class="col-label">To do</span><span class="col-count" id="cnt-todo">0</span></div><div class="col-body" id="col-todo" data-col="todo"></div></div>
  <div><div class="col-head"><span class="col-label">In Progress</span><span class="col-count" id="cnt-inprogress">0</span></div><div class="col-body" id="col-inprogress" data-col="inprogress"></div></div>
  <div><div class="col-head"><span class="col-label">Blocked</span><span class="col-count" id="cnt-blocked">0</span></div><div class="col-body" id="col-blocked" data-col="blocked"></div></div>
  <div><div class="col-head"><span class="col-label">Done</span><span class="col-count" id="cnt-done">0</span></div><div class="col-body" id="col-done" data-col="done"></div></div>
</div>

<!-- CARD MODAL -->
<div class="overlay" id="ov-card" onclick="if(event.target===this)closeOv('ov-card')">
  <div class="modal">
    <div class="modal-title" id="card-modal-title">Add card</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Title</label><input class="form-input" id="f-title" placeholder="Card title"/></div>
      <div class="form-group"><label class="form-label">Section</label><select class="form-input" id="f-section"></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Priority</label>
        <select class="form-input" id="f-priority">
          <option value="urgent">Urgent</option><option value="thisweek">This week</option><option value="planning">Planning</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Status</label>
        <select class="form-input" id="f-status">
          <option value="todo">To do</option><option value="inprogress">In progress</option><option value="blocked">Blocked</option><option value="done">Done</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Deadline</label><input class="form-input" id="f-deadline" placeholder="e.g. 25 Mar"/></div>
    <div class="form-group"><label class="form-label">Assignees</label><div class="assignee-picker" id="assignee-picker"></div></div>
    <div class="form-group"><label class="form-label">Tasks</label><div id="tasks-editor"></div><button class="add-field-btn" onclick="addTaskField()">+ Add task</button></div>
    <div class="modal-foot">
      <button class="btn-del" id="btn-del" onclick="deleteCard()" style="display:none">Delete</button>
      <button class="btn-cancel" onclick="closeOv('ov-card')">Cancel</button>
      <button class="btn-save" onclick="saveCard()">Save</button>
    </div>
  </div>
</div>

<!-- PEOPLE MODAL -->
<div class="overlay" id="ov-people" onclick="if(event.target===this)closeOv('ov-people')">
  <div class="modal">
    <div class="modal-title">People</div>
    <div id="people-list"></div>
    <div class="inline-add">
      <input class="form-input" id="new-person" placeholder="Full name e.g. Mario S." onkeydown="if(event.key==='Enter')addPerson()"/>
      <button class="btn-save" onclick="addPerson()">Add</button>
    </div>
    <div class="modal-foot"><button class="btn-cancel" onclick="closeOv('ov-people')">Close</button></div>
  </div>
</div>

<!-- SECTIONS MODAL -->
<div class="overlay" id="ov-sections" onclick="if(event.target===this)closeOv('ov-sections')">
  <div class="modal">
    <div class="modal-title">Sections</div>
    <div id="sections-list"></div>
    <div class="inline-add">
      <input class="form-input" id="new-section" placeholder="Section name" onkeydown="if(event.key==='Enter')addSection()"/>
      <button class="btn-save" onclick="addSection()">Add</button>
    </div>
    <div class="modal-foot"><button class="btn-cancel" onclick="closeOv('ov-sections')">Close</button></div>
  </div>
</div>

  {id:'p4',name:'Manu Jayawardana',color:'#f5a623'},
  {id:'p5',name:'Ateeb',color:'#4db8ff'}

var DEFAULT_CARDS=[
  {id:1,title:'UN Project',section:'Projects',status:'todo',priority:'urgent',deadline:'25 Mar',assignees:['p1'],tasks:[{t:'Review & verify PATH User Guide v2',done:false},{t:'Final checklist w/ Mario S.',done:false},{t:'Request info/permissions from client',done:false}]},
  {id:2,title:'Moorgate Voice Agent',section:'Projects',status:'todo',priority:'urgent',deadline:'~27 Mar',assignees:['p2'],tasks:[{t:'Fine-tune the VA',done:false},{t:'Run EVALS (client requested)',done:false},{t:'Confirm meeting date with client',done:false}]},

function loadState(){
  try{var d=localStorage.getItem(SK);if(d){var p=JSON.parse(d);return{cards:p.cards||JSON.parse(JSON.stringify(DEFAULT_CARDS)),people:p.people||JSON.parse(JSON.stringify(DEFAULT_PEOPLE)),sections:p.sections||JSON.parse(JSON.stringify(DEFAULT_SECTIONS)),theme:p.theme||'dark'};}}catch(e){}
  return{cards:JSON.parse(JSON.stringify(DEFAULT_CARDS)),people:JSON.parse(JSON.stringify(DEFAULT_PEOPLE)),sections:JSON.parse(JSON.stringify(DEFAULT_SECTIONS)),theme:'dark'};
}
var S=loadState();
var CARDS=S.cards,PEOPLE=S.people,SECTIONS=S.sections;
var secFilter='all',statFilter='all',personFilter='all';
var editingId=null,selAssignees=[],dragId=null;
var manageOpen=false,asgnOpen=false;
document.body.className=S.theme;

function persist(){
  try{localStorage.setItem(SK,JSON.stringify({cards:CARDS,people:PEOPLE,sections:SECTIONS,theme:S.theme}));showSaved();}catch(e){}
}
function showSaved(){
  var t=document.getElementById('save-tag');t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},1500);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ini(n){return n.split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);}
function getPerson(id){return PEOPLE.find(function(p){return p.id===id;});}
function bClass(p){return p==='urgent'?'b-urgent':p==='thisweek'?'b-thisweek':'b-planning';}
function bLabel(p){return p==='urgent'?'Urgent':p==='thisweek'?'This week':'Planning';}
function cardOk(c){
  return(secFilter==='all'||c.section===secFilter)&&
    (statFilter==='all'||c.status===statFilter)&&
    (personFilter==='all'||(c.assignees&&c.assignees.indexOf(personFilter)>-1));
}

/* ── TOOLBAR RENDER ── */
function renderSectionChips(){
  var row=document.getElementById('row-sections');row.innerHTML='';
  function mk(label,val){
    var b=document.createElement('button');b.className='chip'+(secFilter===val?' active':'');
    b.textContent=label;b.onclick=function(){secFilter=val;renderSectionChips();render();};return b;
  }
  row.appendChild(mk('All','all'));
  SECTIONS.forEach(function(s){row.appendChild(mk(s,s));});
}
function renderStatusChips(){
  var row=document.getElementById('row-status');row.innerHTML='';
  var allCount=CARDS.length;
  function mk(label,val,count){
    var b=document.createElement('button');b.className='chip'+(statFilter===val?' active':'');
    b.innerHTML='<span class="chip-count">'+count+'</span>'+label;
    b.onclick=function(){statFilter=statFilter===val?'all':val;renderStatusChips();render();};return b;
  }
  row.appendChild(mk('All','all',allCount));
  COLS.forEach(function(col){
    var n=CARDS.filter(function(c){return c.status===col;}).length;
    row.appendChild(mk(COL_LABELS[col],col,n));
  });
}
function renderAsgnMenu(){
  var menu=document.getElementById('asgn-menu');menu.innerHTML='';
  function item(label,val,color){
    var el=document.createElement('div');el.className='asgn-item'+(personFilter===val?' selected':'');
    if(color){var av=document.createElement('div');av.className='asgn-avatar';av.style.background=color;av.textContent=ini(label);el.appendChild(av);}
    var nm=document.createElement('span');nm.className='asgn-name';nm.textContent=label;el.appendChild(nm);
    var chk=document.createElement('span');chk.className='asgn-check';chk.textContent=personFilter===val?'\u2713':'';el.appendChild(chk);
    el.onclick=function(){personFilter=personFilter===val?'all':val;asgnOpen=false;menu.classList.add('hidden');updateAsgnBtn();render();renderStatusChips();};
    return el;
  }
  menu.appendChild(item('All team members','all',null));
  var div=document.createElement('div');div.className='asgn-divider';menu.appendChild(div);
  PEOPLE.forEach(function(p){menu.appendChild(item(p.name,p.id,p.color));});
}
function updateAsgnBtn(){
  var btn=document.getElementById('asgn-btn');
  var lbl=document.getElementById('asgn-label');
  if(personFilter==='all'){btn.classList.remove('filtered');lbl.textContent='Assignee';}
  else{var p=getPerson(personFilter);if(p){btn.classList.add('filtered');lbl.textContent=p.name;}}
}
function toggleAsgn(){asgnOpen=!asgnOpen;var m=document.getElementById('asgn-menu');if(asgnOpen){renderAsgnMenu();m.classList.remove('hidden');var btn=document.getElementById('asgn-btn');var rect=btn.getBoundingClientRect();m.style.right=(window.innerWidth-rect.right)+'px';m.style.top=(rect.bottom+6)+'px';}else{m.classList.add('hidden');}}
function toggleManage(){manageOpen=!manageOpen;document.getElementById('manage-menu').classList.toggle('hidden',!manageOpen);}
function closeManage(){manageOpen=false;document.getElementById('manage-menu').classList.add('hidden');}
document.addEventListener('click',function(e){
  if(asgnOpen&&!document.getElementById('asgn-wrap').contains(e.target)){asgnOpen=false;document.getElementById('asgn-menu').classList.add('hidden');}
  if(manageOpen&&!document.getElementById('manage-wrap').contains(e.target)){manageOpen=false;document.getElementById('manage-menu').classList.add('hidden');}
});

/* ── BOARD RENDER ── */
function buildCard(card){
  var el=document.createElement('div');el.className='card';el.id='card-'+card.id;el.draggable=true;el.dataset.id=card.id;
  var allT=card.tasks.length,doneT=card.tasks.filter(function(t){return t.done;}).length;
  var pct=allT?Math.round(doneT/allT*100):0;
  var tasksHtml='';
  for(var i=0;i<card.tasks.length;i++){
    var tk=card.tasks[i];
    tasksHtml+='<div class="task-row"><div class="cb'+(tk.done?' checked':'')+'" data-cid="'+card.id+'" data-ti="'+i+'"></div><span class="task-txt'+(tk.done?' done':'')+'">'+esc(tk.t)+'</span></div>';
  }
  var avatarsHtml='<div class="card-avatars">';
  if(card.assignees&&card.assignees.length){card.assignees.forEach(function(pid){var p=getPerson(pid);if(p)avatarsHtml+='<div class="c-avatar" style="background:'+p.color+'" title="'+esc(p.name)+'">'+ini(p.name)+'</div>';});}
  avatarsHtml+='</div>';
  el.innerHTML=
    '<div class="card-sec">'+esc(card.section)+'</div>'
    +'<div class="card-top"><span class="card-title">'+esc(card.title)+'</span><span class="badge '+bClass(card.priority)+'">'+bLabel(card.priority)+'</span></div>'
    +(card.deadline?'<div class="deadline"><span class="dl-dot"></span>'+esc(card.deadline)+'</div>':'')
    +(card.tasks.length?'<div class="tasks">'+tasksHtml+'</div>':'')
    +(allT?'<div class="prog-bar-wrap"><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div><div class="prog-txt">'+doneT+'/'+allT+'</div></div>':'')
    +'<div class="card-foot">'+avatarsHtml+'<button class="edit-btn" data-edit="'+card.id+'">Edit</button></div>';
  el.addEventListener('dragstart',function(e){dragId=card.id;setTimeout(function(){el.classList.add('dragging');},0);e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',String(card.id));});
  el.addEventListener('dragend',function(){el.classList.remove('dragging');dragId=null;document.querySelectorAll('.col-body').forEach(function(c){c.classList.remove('drag-over');});});
  el.querySelectorAll('.cb').forEach(function(cb){cb.addEventListener('click',function(e){e.stopPropagation();toggleTask(parseInt(cb.dataset.cid),parseInt(cb.dataset.ti));});});
  el.querySelector('[data-edit]').addEventListener('click',function(e){e.stopPropagation();openEdit(card.id);});
  return el;
}
function render(){
  var allT=0,doneT=0;
  COLS.forEach(function(col){
    var cards=CARDS.filter(function(c){return c.status===col&&cardOk(c);});
    var body=document.getElementById('col-'+col);body.innerHTML='';
    if(!cards.length){var emp=document.createElement('div');emp.className='col-empty';emp.textContent='Drop cards here';body.appendChild(emp);}
    else{cards.forEach(function(c){body.appendChild(buildCard(c));});}
    document.getElementById('cnt-'+col).textContent=cards.length;
  });
  CARDS.forEach(function(c){allT+=c.tasks.length;doneT+=c.tasks.filter(function(t){return t.done;}).length;});
  var pct=allT?Math.round(doneT/allT*100):0;
  document.getElementById('ring-pct').textContent=pct+'%';
  document.getElementById('ring').setAttribute('stroke-dashoffset',81.7-(pct/100)*81.7);
  renderStatusChips();
}

/* DRAG DROP */
document.querySelectorAll('.col-body').forEach(function(col){
  col.addEventListener('dragover',function(e){e.preventDefault();col.classList.add('drag-over');});
  col.addEventListener('dragleave',function(e){if(!col.contains(e.relatedTarget))col.classList.remove('drag-over');});
  col.addEventListener('drop',function(e){
    e.preventDefault();col.classList.remove('drag-over');
    var id=parseInt(e.dataTransfer.getData('text/plain'));
    var nc=col.dataset.col;
    var card=CARDS.find(function(c){return c.id===id;});
    if(card&&nc&&card.status!==nc){card.status=nc;persist();render();}
  });
});

function toggleTask(cid,ti){var c=CARDS.find(function(x){return x.id===cid;});if(c){c.tasks[ti].done=!c.tasks[ti].done;persist();render();}}
function toggleTheme(){S.theme=document.body.className==='dark'?'light':'dark';document.body.className=S.theme;persist();}

/* CARD MODAL */
function populateSecDrop(){var s=document.getElementById('f-section');s.innerHTML='';SECTIONS.forEach(function(x){var o=document.createElement('option');o.value=x;o.textContent=x;s.appendChild(o);});}
function renderApPicker(){
  var p=document.getElementById('assignee-picker');p.innerHTML='';
  PEOPLE.forEach(function(person){
    var b=document.createElement('button');b.className='ap-chip'+(selAssignees.indexOf(person.id)>-1?' sel':'');b.type='button';
    var d=document.createElement('span');d.className='ap-dot';d.style.background=person.color;b.appendChild(d);b.appendChild(document.createTextNode(person.name));
    b.onclick=function(){var idx=selAssignees.indexOf(person.id);if(idx>-1)selAssignees.splice(idx,1);else selAssignees.push(person.id);renderApPicker();};
    p.appendChild(b);
  });
}
function renderTaskFields(tasks){
  var ed=document.getElementById('tasks-editor');ed.innerHTML='';
  tasks.forEach(function(tk){
    var row=document.createElement('div');row.className='task-edit-row';
    var inp=document.createElement('input');inp.className='form-input';inp.value=tk.t;inp.placeholder='Task description';
    var rm=document.createElement('button');rm.className='rm-btn';rm.type='button';rm.textContent='\xD7';rm.onclick=function(){row.remove();};
    row.appendChild(inp);row.appendChild(rm);ed.appendChild(row);
  });
}
function addTaskField(){
  var ed=document.getElementById('tasks-editor');
  var row=document.createElement('div');row.className='task-edit-row';
  var inp=document.createElement('input');inp.className='form-input';inp.placeholder='Task description';
  var rm=document.createElement('button');rm.className='rm-btn';rm.type='button';rm.textContent='\xD7';rm.onclick=function(){row.remove();};
  row.appendChild(inp);row.appendChild(rm);ed.appendChild(row);inp.focus();
}
function openAdd(){
  editingId=null;selAssignees=[];
  document.getElementById('card-modal-title').textContent='Add card';
  document.getElementById('f-title').value='';
  populateSecDrop();document.getElementById('f-section').value=secFilter!=='all'?secFilter:SECTIONS[0];
  document.getElementById('f-priority').value='thisweek';document.getElementById('f-status').value='todo';
  document.getElementById('f-deadline').value='';document.getElementById('btn-del').style.display='none';
  renderApPicker();renderTaskFields([]);document.getElementById('ov-card').classList.add('open');
}
function openEdit(cid){
  var card=CARDS.find(function(c){return c.id===cid;});if(!card)return;
  editingId=cid;selAssignees=(card.assignees||[]).slice();
  document.getElementById('card-modal-title').textContent='Edit card';
  document.getElementById('f-title').value=card.title;
  populateSecDrop();document.getElementById('f-section').value=card.section;
  document.getElementById('f-priority').value=card.priority;document.getElementById('f-status').value=card.status;
  document.getElementById('f-deadline').value=card.deadline||'';document.getElementById('btn-del').style.display='block';
  renderApPicker();renderTaskFields(card.tasks);document.getElementById('ov-card').classList.add('open');
}
function saveCard(){
  var title=document.getElementById('f-title').value.trim();if(!title)return;
  var inputs=document.getElementById('tasks-editor').querySelectorAll('input');
  var tasks=[];inputs.forEach(function(i){var v=i.value.trim();if(v)tasks.push({t:v,done:false});});
  if(editingId){
    var card=CARDS.find(function(c){return c.id===editingId;});
    if(card){var old=card.tasks;card.title=title;card.section=document.getElementById('f-section').value;card.priority=document.getElementById('f-priority').value;card.status=document.getElementById('f-status').value;card.deadline=document.getElementById('f-deadline').value;card.assignees=selAssignees.slice();card.tasks=tasks.map(function(tk,i){return{t:tk.t,done:old[i]?old[i].done:false};});}
  }else{
    var nid=CARDS.length?Math.max.apply(null,CARDS.map(function(c){return c.id;}))+1:1;
    CARDS.push({id:nid,title:title,section:document.getElementById('f-section').value,priority:document.getElementById('f-priority').value,status:document.getElementById('f-status').value,deadline:document.getElementById('f-deadline').value,assignees:selAssignees.slice(),tasks:tasks});
  }
  closeOv('ov-card');persist();render();
}
function deleteCard(){if(!editingId)return;CARDS=CARDS.filter(function(c){return c.id!==editingId;});closeOv('ov-card');persist();render();}

/* PEOPLE MODAL */
function openPeople(){renderPeopleList();document.getElementById('new-person').value='';document.getElementById('ov-people').classList.add('open');}
function renderPeopleList(){
  var list=document.getElementById('people-list');list.innerHTML='';
  PEOPLE.forEach(function(p,idx){
    var row=document.createElement('div');row.className='list-row';
    var av=document.createElement('div');av.className='list-avatar';av.style.background=p.color;av.textContent=ini(p.name);
    var nm=document.createElement('span');nm.className='list-label';nm.textContent=p.name;
    var acts=document.createElement('div');acts.className='list-actions';
    var ci=document.createElement('input');ci.type='color';ci.value=p.color;ci.style.cssText='width:22px;height:22px;border:none;border-radius:50%;cursor:pointer;padding:0;background:none;flex-shrink:0';
    ci.oninput=function(){p.color=ci.value;persist();renderPeopleList();render();updateAsgnBtn();};
    var del=document.createElement('button');del.className='sm-btn danger';del.textContent='Remove';
    del.onclick=function(){PEOPLE.splice(idx,1);CARDS.forEach(function(c){c.assignees=(c.assignees||[]).filter(function(a){return a!==p.id;});});if(personFilter===p.id){personFilter='all';updateAsgnBtn();}persist();renderPeopleList();render();renderApPicker();};
    acts.appendChild(ci);acts.appendChild(del);row.appendChild(av);row.appendChild(nm);row.appendChild(acts);list.appendChild(row);
  });
}
function addPerson(){
  var name=document.getElementById('new-person').value.trim();if(!name)return;
  PEOPLE.push({id:'p'+Date.now(),name:name,color:AV_COLORS[PEOPLE.length%AV_COLORS.length]});
  document.getElementById('new-person').value='';
  persist();renderPeopleList();render();renderApPicker();
}

/* SECTIONS MODAL */
function openSections(){renderSectionsList();document.getElementById('new-section').value='';document.getElementById('ov-sections').classList.add('open');}
function renderSectionsList(){
  var list=document.getElementById('sections-list');list.innerHTML='';
  SECTIONS.forEach(function(s,idx){
    var row=document.createElement('div');row.className='list-row';
    var nm=document.createElement('span');nm.className='list-label';nm.textContent=s;
    var acts=document.createElement('div');acts.className='list-actions';
    var del=document.createElement('button');del.className='sm-btn danger';del.textContent='Remove';
    del.onclick=function(){SECTIONS.splice(idx,1);if(secFilter===s){secFilter='all';}persist();renderSectionsList();renderSectionChips();render();};
    acts.appendChild(del);row.appendChild(nm);row.appendChild(acts);list.appendChild(row);
  });
}
function addSection(){
  var name=document.getElementById('new-section').value.trim();if(!name||SECTIONS.indexOf(name)>-1)return;
  SECTIONS.push(name);document.getElementById('new-section').value='';
  persist();renderSectionsList();renderSectionChips();populateSecDrop();
}

function closeOv(id){document.getElementById(id).classList.remove('open');editingId=null;}

/* INIT */
renderSectionChips();render();
